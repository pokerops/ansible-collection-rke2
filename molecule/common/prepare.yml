---
- name: Prepare KVM guests
  hosts: all
  become: true
  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
      changed_when: false
      when: ansible_os_family == 'Debian'

    - name: Install gpg agent
      ansible.builtin.apt:
        package: gpg-agent
      changed_when: false
      when: ansible_os_family == 'Debian'

    - name: Install python3 binary redirection
      ansible.builtin.apt:
        name: python-is-python3
      when: ansible_os_family == 'Debian'

    - name: Disable ipv6
      ansible.posix.sysctl:
        name: "{{ item }}"
        value: 1
        sysctl_set: true
      loop:
        - net.ipv6.conf.all.disable_ipv6
        - net.ipv6.conf.default.disable_ipv6
        - net.ipv6.conf.lo.disable_ipv6

    - name: Install multipath tools
      ansible.builtin.package:
        name: "{{ (ansible_os_family == 'Debian') | ternary(_multipath_deb, _multipath_rpm) }}"
      vars:
        _multipath_deb: multipath-tools
        _multipath_rpm: device-mapper-multipath

    - name: Check rke2_api_url parameter
      ansible.builtin.assert:
        that: rke2_api_url is defined
        fail_msg: "rke2_api_url must be defined"

    - name: Create api host file entry
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: ".*{{ _api_hostname }}.*"
        line: "{{ ansible_default_ipv4.address }} {{ _api_hostname }}"
      vars:
        _api_hostname: "{{ rke2_api_url | urlsplit('hostname') }}"

- name: Prepare KVM host
  hosts: localhost
  become: true
  tasks:
    - name: Create api host file entry
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: ".*{{ _api_hostname }}.*"
        line: "{{ _api_address }} {{ _api_hostname }}"
      vars:
        _api_hostname: "{{ rke2_api_url | urlsplit('hostname') }}"
        _api_address: "{{ hostvars[groups['rke2_server'].0]['ansible_default_ipv4']['address'] }}"

    - name: Configure BGP support
      when: rke2_metallb_mode | default("l2") == "bgp"
      block:
        - name: Ensure Docker is installed
          ansible.builtin.package:
            name: docker.io
            state: present

        - name: Start Docker service
          ansible.builtin.systemd:
            name: docker
            state: started
            enabled: true

        - name: Create FRR configuration directory
          ansible.builtin.file:
            path: /etc/frr
            state: directory
            mode: "0755"

        - name: Create FRR daemons configuration
          ansible.builtin.copy:
            dest: /etc/frr/daemons
            content: |
              bgpd=yes
              ospfd=no
              ospf6d=no
              ripd=no
              ripngd=no
              isisd=no
              pimd=no
              ldpd=no
              nhrpd=no
              eigrpd=no
              babeld=no
              sharpd=no
              pbrd=no
              bfdd=no
              fabricd=no
              vrrpd=no
              pathd=no

              vtysh_enable=yes
              zebra_options="  -A 127.0.0.1 -s 90000000"
              bgpd_options="   -A 127.0.0.1"
            mode: "0640"

        - name: Start FRR container
          community.docker.docker_container:
            name: frr
            image: quay.io/frrouting/frr:stable
            state: started
            restart_policy: unless-stopped
            network_mode: host
            privileged: true
            capabilities:
              - NET_ADMIN
              - NET_RAW
              - SYS_ADMIN
            volumes:
              - /etc/frr:/etc/frr
            command: ["/sbin/tini", "--", "/usr/lib/frr/docker-start"]
