---
- name: Gather cluster facts
  hosts: all
  gather_facts: true

- name: Verify cluster BGP configuration
  hosts: localhost
  any_errors_fatal: true
  tasks:
    - name: Verify cluster pod status
      ansible.builtin.shell:
        cmd: "/var/lib/rancher/rke2/bin/kubectl get pod -A -o json | jq '.items'"
      retries: 15
      delay: 20
      register: _pod_data
      vars:
        _pod_data: "{{ _pod_data.stdout | from_json }}"
        _pod_status: "{{ _pod_data | selectattr('status', 'defined') }}"
        _pod_phase: "{{ _pod_status | selectattr('status.phase', 'defined') }}"
        _pod_completed: "{{ _pod_phase | rejectattr('status.phase', 'equalto', 'Running') }}"
        _pod_failed: "{{ _pod_completed | rejectattr('status.phase', 'equalto', 'Succeeded') }}"
      until: _pod_failed | length == 0
      failed_when:
        - (_pod_status | length) != (_pod_data | length)
        - (_pod_phase | length) != (_pod_data | length)
        - _pod_failed | length > 0

    - name: Verify BGP Peer resources exist
      block:
        - name: Query BGPPeer resources
          kubernetes.core.k8s_info:
            version: metallb.io/v1beta2
            kind: BGPPeer
            namespace: metallb-system
            kubeconfig: "{{ molecule_local_kubeconfig }}"
          register: _bgp_peers

        - name: Verify BGPPeer
          ansible.builtin.assert:
            that: _bgp_peers.resources | length > 0
            fail_msg: "Found no BGPPeers"

    - name: Verify BGP Advertisement resource exists
      block:
        - name: Query BGPAdvertisement resources
          kubernetes.core.k8s_info:
            version: metallb.io/v1beta1
            kind: BGPAdvertisement
            namespace: metallb-system
            kubeconfig: "{{ molecule_local_kubeconfig }}"
          register: _bgp_advertisements

        - name: Verify BGPAdvertisement
          ansible.builtin.assert:
            that: _bgp_advertisements.resources | selectattr('metadata.name', 'equalto', 'metallb') | list | length == 1
            fail_msg: "Found no BGPAdvertisements"

        - name: Query L2Advertisement resources
          kubernetes.core.k8s_info:
            version: metallb.io/v1beta2
            kind: L2Advertisement
            namespace: metallb-system
            kubeconfig: "{{ molecule_local_kubeconfig }}"
          register: _l2_advertisements

        - name: Verify no L2Advertisement resources exist
          ansible.builtin.assert:
            that: _l2_advertisements.resources | length == 0
            fail_msg: "Found L2Advertisement resources in BGP mode: {{ _l2_advertisements.resources | map(attribute='metadata.name') | list }}"

    - name: Verify ingress controller LoadBalancer services
      vars:
        _namespace: nginx
      block:
        - name: Query Ingress controller services
          kubernetes.core.k8s_info:
            kind: Service
            namespace: "{{ _namespace }}"
            kubeconfig: "{{ molecule_local_kubeconfig }}"
          register: _ingress_service_query

        - name: Set Ingress controller facts
          ansible.builtin.set_fact:
            _ingress_services: "{{ _ingress_service_query.resources | selectattr('spec.type', 'equalto', 'LoadBalancer') | list }}"

        - name: Verify LoadBalancer services
          ansible.builtin.assert:
            that: _ingress_services | length == 2
            fail_msg: "Expected 2 Ingress controllers, found {{ _ingress_services | length }}"

        - name: Verify Ingress controllers have External IPs
          ansible.builtin.assert:
            that:
              - item.status.loadBalancer.ingress is defined
              - item.status.loadBalancer.ingress | length > 0
              - item.status.loadBalancer.ingress[0].ip is defined
            fail_msg: "Service {{ item.metadata.name }} has no External IP assigned"
          loop_control:
            label: "{{ item.metadata.name }}"
          loop: "{{ _ingress_services }}"

        - name: Record Ingress IPs
          ansible.builtin.set_fact:
            _ingress_ips: "{{ _ingress_services | map(attribute='status.loadBalancer.ingress') | map('first') | map(attribute='ip') | list }}"

    - name: Verify FRR container is running
      block:
        - name: Query FRR container status
          community.docker.docker_container_info:
            name: frr
          register: _frr_container_query

        - name: Assert FRR container is running
          ansible.builtin.assert:
            that: _status == 'running'
            fail_msg: "FRR container is in state {{ _status }}"
          vars:
            _status: "{{ _frr_container_query.container.State.Status }}"

    - name: Verify FRR BGP daemon is active
      block:
        - name: Query BGP summary
          ansible.builtin.shell:
            cmd: "docker exec frr vtysh -c 'show bgp summary json'"
          register: _bgp_summary_query

        - name: Parse BGP neighbor data
          ansible.builtin.set_fact:
            _bgp_summary: "{{ _bgp_summary_query.stdout }}"

        - name: Verify neighbor list
          ansible.builtin.assert:
            that:
              - _neighbors | length > 0
              - _neighbors | symmetric_difference(_nodes) | length == 0
            fail_msg: "Found neighbor mismatch, expected {{ _nodes }}, got {{ _neighbors }} "
            success_msg: "All neighbors are registered i bgp summary: {{ _neighbors }}"
          vars:
            _neighbors: "{{ _bgp_summary.ipv4Unicast.peers.values() | map(attribute='hostname') }}"
            _nodes: "{{ groups['all'] }}"

        - name: Verify neighbor state
          ansible.builtin.assert:
            that:
              - _neighbors | length > 0
              - _neighbors_ok | length > 0
              - _neighbors_ko | length == 0
            fail_msg: "The following neighbors are in a failed state: {{ _neighbors_ko | map(attribute='hostname') }}"
            success_msg: "All neighbors have established adjacencies: {{ _neighbors | map(attribute='hostname') }}"
          vars:
            _neighbors: "{{ _bgp_summary.ipv4Unicast.peers.values() }}"
            _neighbors_ok: "{{ _neighbors | selectattr('state', 'equalto', 'Established') }}"
            _neighbors_ko: "{{ _neighbors | rejectattr('state', 'equalto', 'Established') }}"

        - name: Verify neighbor prefix advertisements
          ansible.builtin.assert:
            that:
              - _neighbors | length > 0
              - _neighbors_ko | length == 0
            fail_msg: "Neighbor not receiving prefixes: {{ _neighbors_ko | map(attribute='hostname') }}"
          vars:
            _neighbors: "{{ _bgp_summary.ipv4Unicast.peers.values() }}"
            _neighbors_ko: "{{ _neighbors | selectattr('pfxRcd', 'lessthan', 1) }}"

    - name: Verify BGP route propagation
      block:
        - name: Query BGP IPv4 unicast routes
          ansible.builtin.shell:
            cmd: "docker exec frr vtysh -c 'show bgp ipv4 unicast json'"
          register: _bgp_route_query

        - name: Parse BGP IPv4 unicast data
          ansible.builtin.set_fact:
            _bgp_routes: "{{ _bgp_route_query.stdout }}"
            _ingress_routes: "{{ _ingress_ips | product(['32']) | map('join', '/') }}"

        - name: Verify ingress IPs exist in BGP table
          ansible.builtin.assert:
            that:
              - _routes | length > 0
              - _routes | symmetric_difference(_ingress_routes) | length == 0
            fail_msg: "Found BGP route mismatch, expected {{ _ingress_routes }}, got {{ _routes }}"
            success_msg: "Foud BGP routes for ingress ips {{ _ingress_routes }}"
          vars:
            _routes: "{{ _bgp_routes.routes.keys() }}"

        - name: Verify route validity
          ansible.builtin.assert:
            that:
              - _routes | length > 0
              - _routes_best | length > 0
            fail_msg: "No best route registered for prefix {{ item }}"
            success_msg: "Best path found for prefix {{ item }} through peer {{ (_routes_best | first).peerId }}"
          vars:
            _routes: "{{ _bgp_routes.routes[item] }}"
            _routes_valid: "{{ _routes | selectattr('valid', 'defined') | selectattr('valid', 'equalto', true) }}"
            _routes_best: "{{ _routes_valid | selectattr('bestpath', 'defined') | selectattr('bestpath', 'equalto', true) }}"
          loop: "{{ _ingress_routes }}"

        - name: Verify route next hops
          ansible.builtin.assert:
            that:
              - _routes_ok | length > 0
              - _routes_ko | length == 0
            fail_msg: "No next hops found for routes from peers {{ _routes_ko | map(attribute='peerId') }}"
          vars:
            _routes: "{{ _bgp_routes.routes[item] }}"
            _routes_ok: "{{ _routes | rejectattr('nexthops', 'equalto', []) }}"
            _routes_ko: "{{ _routes | selectattr('nexthops', 'equalto', []) }}"
          loop: "{{ _ingress_routes }}"

    - name: Verify routes installed in FRR kernel
      block:
        - name: Query routes for all ingress IPs
          ansible.builtin.shell:
            cmd: "docker exec frr ip -j -d route show"
          register: _frr_route_query

        - name: Parse route data
          ansible.builtin.set_fact:
            _frr_routes: "{{ _frr_route_query.stdout }}"

        - debug:

        - debug:
            msg: "{{ groups['all'] | map('extract', hostvars, ['ansible_default_ipv4', 'address']) }}"

        - name: Verify ingress routes
          ansible.builtin.assert:
            that:
              - _routes_match | length == 1
              - _route_match.protocol == "bgp"
              - _route_match.nexthops | length > 0
              - _route_match.nexthops | map(attribute='gateway') | symmetric_difference(_nodes) | length == 0
            fail_msg: "Route for {{ item.item }} not installed in FRR kernel"
          vars:
            _routes_ingress: "{{ _frr_routes | selectattr('dst', 'equalto', item) }}"
            _routes_match: "{{ _routes_ingress | first }}"
            _nodes: "{{ groups['all'] | map('extract', hostvars, ['ansible_default_ipv4', 'address']) }}"
          loop: "{{ _frr_routes.results }}"

    - name: Verify routes on host system
      block:
        - name: Query routes for all ingress IPs on host
          ansible.builtin.shell:
            cmd: "ip route show {{ item }}"
          register: _host_routes
          changed_when: false
          become: true
          loop: "{{ _ingress_ips }}"

        - name: Assert all routes in host table
          ansible.builtin.assert:
            that: item.stdout | length > 0
            fail_msg: "Route for {{ item.item }} not found in host routing table"
          loop: "{{ _host_routes.results }}"
          loop_control:
            label: "{{ item.item }}"

        - name: Count nexthops for each IP
          ansible.builtin.shell:
            cmd: "ip route show {{ item }} | grep -o 'nexthop' | wc -l"
          register: _nexthop_counts
          changed_when: false
          become: true
          loop: "{{ _ingress_ips }}"

        - name: Assert ECMP with all cluster nodes
          ansible.builtin.assert:
            that: item.stdout | int == 6
            fail_msg: "Expected 6 nexthops for {{ item.item }}, found {{ item.stdout }}"
          loop: "{{ _nexthop_counts.results }}"
          loop_control:
            label: "{{ item.item }}"

    - name: Query ingress controller IPs and resources
      block:
        - name: Get LoadBalancer services
          ansible.builtin.shell:
            cmd: "KUBECONFIG={{ molecule_local_kubeconfig }} kubectl get service -n nginx -o json"
          register: _services_data
          changed_when: false

        - name: Extract LoadBalancer IPs
          ansible.builtin.set_fact:
            _ingress_ips: "{{ _services | selectattr('spec.type', 'equalto', 'LoadBalancer') | map(attribute='status.loadBalancer.ingress') | map('first') | map(attribute='ip') | list }}"
            _private_ingress_ip: "{{ _services | selectattr('metadata.name', 'search', 'private') | map(attribute='status.loadBalancer.ingress') | map('first') | map(attribute='ip') | first }}"
          vars:
            _services: "{{ _services_data.stdout | from_json | json_query('items') }}"

        - name: Get all ingress resources
          ansible.builtin.shell:
            cmd: "KUBECONFIG={{ molecule_local_kubeconfig }} kubectl get ingress -A -o json"
          register: _ingress_data
          changed_when: false

        - name: Extract ingress hosts
          ansible.builtin.set_fact:
            _ingress_hosts: "{{ _ingress_data.stdout | from_json | json_query('items[*].spec.rules[*].host') | flatten }}"

    - name: Verify HTTP/HTTPS connectivity via ingress
      block:
        - name: Test ArgoCD ingress
          ansible.builtin.uri:
            url: "https://{{ _private_ingress_ip }}"
            method: GET
            headers:
              Host: "argocd.rke2.pokerops.net"
            validate_certs: false
            timeout: 5
            status_code:
              - 200
              - 301
              - 302
              - 307
              - 308
          register: _argocd_response
          until: _argocd_response is success

        - name: Test Longhorn ingress
          ansible.builtin.uri:
            url: "https://{{ _private_ingress_ip }}"
            method: GET
            headers:
              Host: "longhorn.rke2.pokerops.net"
            validate_certs: false
            timeout: 5
            status_code:
              - 200
              - 301
              - 302
              - 307
              - 308
          register: _longhorn_response
          until: _longhorn_response is success

        - name: Assert successful responses
          ansible.builtin.assert:
            that:
              - _argocd_response.status in [200, 301, 302, 307, 308]
              - _longhorn_response.status in [200, 301, 302, 307, 308]
            fail_msg: "HTTP requests failed: ArgoCD={{ _argocd_response.status }}, Longhorn={{ _longhorn_response.status }}"

    - name: Verify route persistence and stability
      block:
        - name: Wait for route stability
          ansible.builtin.pause:
            seconds: 10

        - name: Re-query BGP routes
          ansible.builtin.shell:
            cmd: "docker exec frr vtysh -c 'show bgp ipv4 unicast' 2>&1"
          register: _bgp_routes_final
          changed_when: false

        - name: Assert routes still present
          ansible.builtin.assert:
            that: _bgp_routes_final.stdout is search(item | regex_escape + '/32')
            fail_msg: "BGP route for {{ item }}/32 disappeared (route flapping detected)"
          loop: "{{ _ingress_ips }}"

        - name: Re-query kernel routes
          ansible.builtin.shell:
            cmd: "docker exec frr ip route show {{ item }}"
          register: _kernel_routes_final
          changed_when: false
          loop: "{{ _ingress_ips }}"

        - name: Assert kernel routes still installed
          ansible.builtin.assert:
            that: item.stdout | length > 0
            fail_msg: "Kernel route for {{ item.item }} disappeared"
          loop: "{{ _kernel_routes_final.results }}"
          loop_control:
            label: "{{ item.item }}"

    - name: Verify ECMP load distribution
      block:
        - name: Query private IP route details
          ansible.builtin.shell:
            cmd: "ip route show 172.16.16.0"
          register: _private_route_detail
          changed_when: false
          become: true

        - name: Query public IP route details
          ansible.builtin.shell:
            cmd: "ip route show 172.16.17.0"
          register: _public_route_detail
          changed_when: false
          become: true

        - name: Count nexthops
          ansible.builtin.set_fact:
            _private_nh_count: "{{ _private_route_detail.stdout | regex_findall('nexthop') | length }}"
            _public_nh_count: "{{ _public_route_detail.stdout | regex_findall('nexthop') | length }}"

        - name: Assert ECMP across all cluster nodes
          ansible.builtin.assert:
            that:
              - _private_nh_count | int == 6
              - _public_nh_count | int == 6
            fail_msg: "ECMP not distributed across all 6 nodes: private={{ _private_nh_count }}, public={{ _public_nh_count }}"

        - name: Debug ECMP configuration
          ansible.builtin.debug:
            msg:
              - "Private ingress ECMP: {{ _private_nh_count }} nexthops"
              - "Public ingress ECMP: {{ _public_nh_count }} nexthops"
              - "BGP route propagation verified successfully"
